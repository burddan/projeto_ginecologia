<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Câmera Projeto Ginecologia</title>
  </head>
  <body>
    <h1>Câmera de acesso</h1>
    <h1 id=statusGravacao style="display: none;color: red;">Gravando...</h1>
    <h1 id=statusFoto style="display: none;color: black;"></h1>
    <video id="video" autoplay playsinline></video>

    <script>
      const video = document.getElementById("video");
      const statusGravacao = document.getElementById("statusGravacao");
      const statusFoto = document.getElementById("statusFoto");

      let gravadorMedia;
      let chunksGravados = [];
      let camera;
      let gravacaoStatus = false;

      // aqui inicia a camera
      // o problema e que ela pega QUALQUER dispositivo que estiver de camera, queremos apenas a camera que sera utilizada no dispositivo
      async function iniciarCamera() {
        camera = await navigator.mediaDevices.getUserMedia({ video: true });
        //define o objeto da camera
        video.srcObject = camera;
      }

      async function escolherPasta() {
        const folder = await window.electronAPI.escolherPasta();
        if (folder) {
          console.log("Pasta selecionada:", folder);
        } else {
          console.log("Nenhuma pasta selecionada, usando padrão");
        }
      }

      function iniciarGravacao() {
        statusGravacao.style.display = "block";
        chunksGravados = [];
        gravadorMedia = new MediaRecorder(camera, {
          mimeType: "video/webm; codecs=vp8"
        });

        gravadorMedia.ondataavailable = e => {
          if (e.data.size > 0) {
            chunksGravados.push(e.data);
          }
        };

        gravadorMedia.onstop = async () => {
          const blob = new Blob(chunksGravados, { type: "video/webm" });
          const buffer = await blob.arrayBuffer();

          const filename = `Video-${Date.now()}.webm`;
          const path = await window.electronAPI.salvarArquivo({ buffer, filename });

        };

        gravadorMedia.start();
        gravacaoStatus = true;
      }

      function pararGravacao() {
        statusGravacao.style.display = "none";
        gravadorMedia.stop();
        gravacaoStatus = false;
      }

      function tirarFoto() {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);

        canvas.toBlob(async blob => {
          const buffer = await blob.arrayBuffer();
          const filename = `Foto-${Date.now()}.png`;

          const path = await window.electronAPI.salvarArquivo({ buffer, filename });
        });
        // botar o path depois
        statusFoto.innerText = "Foto tirada!";
        statusFoto.style.display = "block";
        setTimeout(() => {
          statusFoto.style.display = "none";
        }, 3000);
      }


      // responsavel por sincronizar o preload.js
      window.electronAPI.iniciarPararGravacao(() => {
        if(gravacaoStatus){
          pararGravacao();
        } else {
          iniciarGravacao();
        }
      });

      window.electronAPI.iniciarFoto(() => {
        tirarFoto();
      });

      iniciarCamera();
      escolherPasta(); 
    </script>
  </body>
</html>
